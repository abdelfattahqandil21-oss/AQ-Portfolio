<section id="skills" class="skills-root">
  @for (cat of categories; track cat.id; let i = $index) {
    <div
      class="skill-block"
      [class.active]="isActive()[i]"
      [style.opacity]="blockStates()[i].opacity"
      [style.transform]="'scale(' + blockStates()[i].scale + ')'"
      [style.pointer-events]="activeIndex() === i ? 'auto' : 'none'"
      [style.z-index]="isActive()[i] ? 5 : 1"
    >
      <div class="skill-card">
        <p class="skill-subtitle">{{ cat.subtitle }}</p>
        <h2 class="skill-title">
          {{ translation.translate(cat.title.ar, cat.title.en, cat.title.fr, cat.title.it) }}
        </h2>

        <ul class="skill-list">
          @for (item of cat.items; track item.name) {
            <li
              class="skill-item"
              [style.transition-delay]="$index * 80 + 'ms'"
            >
              <i class="pi pi-angle-right skill-icon" aria-hidden="true"></i>
              <span>{{ item.name }}</span>
            </li>
          }
        </ul>
      </div>
    </div>
  }
</section>
